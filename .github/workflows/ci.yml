name: CI - Run All Tests

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-nextjs/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend-nextjs
        run: npm ci

      - name: Run linter
        working-directory: ./frontend-nextjs
        run: npm run lint

      - name: Type check
        working-directory: ./frontend-nextjs
        run: npx tsc --noEmit

      - name: Build (no deploy)
        working-directory: ./frontend-nextjs
        env:
          NEXT_PUBLIC_API_URL: 'http://localhost:8080'
          NEXT_PUBLIC_AI_SERVICE_URL: 'http://localhost:8000'
        run: npm run build

  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: ./backend-golang
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend-golang/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: ./backend-golang

      - name: Build
        run: go build -o server main.go

  ai-ci:
    name: AI Service CI
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    defaults:
      run:
        working-directory: ./ai-python
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-python/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter
        run: |
          pip install flake8 black
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
          black --check . || true

      - name: Type check
        run: |
          pip install mypy
          mypy . --ignore-missing-imports || true

  database-migration-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check SQL syntax
        run: |
          if [ -f "database/schema.sql" ]; then
            echo "SQL schema file found"
            # Basic syntax check - in production, use actual PostgreSQL
            grep -q "CREATE TABLE" database/schema.sql && echo "Schema file appears valid"
          fi
