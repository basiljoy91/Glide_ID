name: Deploy Python AI Service

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'ai-python/**'
      - '.github/workflows/deploy-ai.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'ai-python/**'
  workflow_dispatch:

jobs:
  test:
    name: Test Python AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./ai-python
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ai-python/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run linter
        run: |
          pip install flake8 black
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          black --check .

      - name: Run tests
        run: pytest tests/ || echo "No tests directory found"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./ai-python
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ai-python
          file: ./ai-python/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/enterprise-attendance-ai:latest
            ${{ secrets.DOCKER_USERNAME }}/enterprise-attendance-ai:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-huggingface:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./ai-python
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Hugging Face CLI
        run: pip install huggingface_hub[cli]

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          huggingface-cli login --token $HF_TOKEN
          huggingface-cli repo create enterprise-attendance-ai --type space --repo-type public || true
          
          # Copy files to HF format
          mkdir -p /tmp/hf-space
          cp -r ai-python/* /tmp/hf-space/
          cp ai-python/Dockerfile /tmp/hf-space/
          
          # Create app.py for Hugging Face Spaces
          cat > /tmp/hf-space/app.py << 'EOF'
          import subprocess
          import sys
          subprocess.run([sys.executable, "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "7860"])
          EOF
          
          cd /tmp/hf-space
          huggingface-cli upload enterprise-attendance-ai . --repo-type space

  deploy-vps:
    name: Deploy to VPS (Alternative)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && false
    defaults:
      run:
        working-directory: ./ai-python
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/enterprise-attendance-ai
            git pull origin main
            docker-compose pull
            docker-compose up -d --build
            docker-compose restart

  deploy-docker-compose:
    name: Deploy via Docker Compose
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./ai-python
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create docker-compose.yml
        run: |
          cat > docker-compose.yml << 'EOF'
          version: '3.8'
          services:
            ai-service:
              image: ${{ secrets.DOCKER_USERNAME }}/enterprise-attendance-ai:latest
              ports:
                - "8000:8000"
              environment:
                - DATABASE_URL=${{ secrets.DATABASE_URL }}
                - API_KEY=${{ secrets.AI_SERVICE_API_KEY }}
                - ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
              restart: unless-stopped
          EOF

      - name: Upload docker-compose.yml
        uses: actions/upload-artifact@v4
        with:
          name: docker-compose-ai
          path: docker-compose.yml
          retention-days: 1

