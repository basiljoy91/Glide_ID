##
## Example NGINX config fragment for mTLS termination (kiosk -> gateway).
## Include this inside a `server {}` block that has `listen 443 ssl;`.
##
## Notes:
## - Use a private upstream network between NGINX and the Go API.
## - Keep the Go API on HTTP behind the gateway (or re-encrypt internally if required).
##

# Server certificate
ssl_certificate     /etc/nginx/certs/server.crt;
ssl_certificate_key /etc/nginx/certs/server.key;

# Trust store for kiosk client certs (your CA)
ssl_client_certificate /etc/nginx/certs/kiosk_ca.crt;
ssl_verify_client on;
ssl_verify_depth 2;

# Prefer modern TLS
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers on;

# Optional: tighten request size/timeouts
client_max_body_size 10m;

# Upstream Go API
location / {
  # Block if mTLS verification failed (belt & suspenders)
  if ($ssl_client_verify != SUCCESS) { return 403; }

  proxy_pass http://enterprise_attendance_api:8080;

  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;

  # Optional: forward mTLS identity signals for auditing
  proxy_set_header X-mTLS-Verified $ssl_client_verify;
  proxy_set_header X-mTLS-Subject $ssl_client_s_dn;
  proxy_set_header X-mTLS-Issuer  $ssl_client_i_dn;
}

