name: Deploy Go Backend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend-golang/**'
      - '.github/workflows/deploy-go.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend-golang/**'
  workflow_dispatch:

jobs:
  test:
    name: Test Go Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend-golang
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend-golang/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: ./backend-golang

  build:
    name: Build Go Backend
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ./backend-golang
    
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend-golang/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          OUTPUT_NAME="server"
          if [ "${{ matrix.os }}" == "windows" ]; then
            OUTPUT_NAME="server.exe"
          fi
          go build -ldflags="-s -w" -o $OUTPUT_NAME main.go

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-backend-${{ matrix.os }}-${{ matrix.arch }}
          path: backend-golang/server*
          retention-days: 7

  deploy-render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./backend-golang
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: go-backend-linux-amd64
          path: ./backend-golang

      - name: Deploy to Render
        uses: johnbeynon/render-deploy@v1.1.0
        with:
          service-id: ${{ secrets.RENDER_SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}

  deploy-koyeb:
    name: Deploy to Koyeb (Alternative)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && false
    defaults:
      run:
        working-directory: ./backend-golang
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Koyeb CLI
        run: |
          curl -fsSL https://www.koyeb.com/cli | sh
          echo "$HOME/.koyeb/bin" >> $GITHUB_PATH

      - name: Deploy to Koyeb
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          koyeb service create \
            --name enterprise-attendance-api \
            --type web \
            --git github/${{ github.repository }} \
            --git-branch main \
            --git-build-command "cd backend-golang && go build -o server main.go" \
            --git-run-command "./server" \
            --ports 8080 \
            --regions fra \
            --env DATABASE_URL=${{ secrets.DATABASE_URL }} \
            --env JWT_SECRET=${{ secrets.JWT_SECRET }} \
            --env AI_SERVICE_URL=${{ secrets.AI_SERVICE_URL }} \
            --env AI_SERVICE_API_KEY=${{ secrets.AI_SERVICE_API_KEY }}

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ./backend-golang
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-golang
          file: ./backend-golang/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/enterprise-attendance-api:latest
            ${{ secrets.DOCKER_USERNAME }}/enterprise-attendance-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

